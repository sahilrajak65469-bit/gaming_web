<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Station Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            transition: background 0.3s;
        }

        .search-btn:hover {
            background: #5568d3;
        }

        .results-section {
            margin-top: 30px;
        }

        .results-header {
            color: white;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .police-station-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .police-station-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .station-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        .station-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 12px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-icon {
            font-size: 1.2rem;
            color: #667eea;
            margin-top: 2px;
            min-width: 20px;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-weight: 600;
            color: #34495e;
            font-size: 0.9rem;
        }

        .info-value {
            color: #555;
            margin-top: 3px;
        }

        .no-results {
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            color: #555;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .no-results p {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .search-row {
                grid-template-columns: 1fr;
            }

            .station-info {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }
        }

        .filter-options {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .filter-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .filter-tag:hover {
            background: #5568d3;
        }

        .emergency-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
            margin-top: 20px;
            color: #856404;
        }

        .emergency-info strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

                        <option value="west-bengal">West Bengal</option>
                        <option value="punjab">Punjab</option>
                        <option value="rajasthan">Rajasthan</option>

                </div>

                <div class="form-group">
                    <label for="district">Select District</label>
                    <select id="district">
                        <option value="">-- Choose District --</option>
                    </select>
                </div>

                <button class="search-btn" onclick="searchPoliceStations()">Search</button>
            </div>

            <div class="filter-options" id="filterOptions" style="display: none;">
                <strong>Quick Filter:</strong>
                <div id="quickFilters"></div>
            </div>

            <div class="emergency-info">
                <strong>Emergency Contact:</strong>
                <span>📞 Call 100 for immediate police assistance (India-wide)</span>

        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <div class="results-header" id="resultsHeader"></div>
            <div id="resultsList"></div>
        </div>
    </div>

            punjab: ["Amritsar", "Ludhiana", "Jalandhar", "Patiala", "Bathinda"],
            rajasthan: ["Jaipur", "Jodhpur", "Udaipur", "Ajmer", "Bikaner"]
        };

        function updateDistricts() {
            const state = document.getElementById('state').value.toLowerCase();
            const districtSelect = document.getElementById('district');
            districtSelect.innerHTML = '<option value="">-- Choose District --</option>';

            if (state && districtsByState[state]) {
                districtsByState[state].forEach(district => {
                    const option = document.createElement('option');
                    option.value = district.toLowerCase();
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        function searchPoliceStations() {
            const state = document.getElementById('state').value.toLowerCase();
            const district = document.getElementById('district').value.toLowerCase();

            if (!state || !district) {
                alert('Please select both state and district');
                return;
            }

            const stations = policeStations[state]?.[district] || [];

            if (stations.length === 0) {
                displayNoResults();
                return;
            }

            displayResults(stations, state, district);
        }

        function displayResults(stations, state, district) {
            const resultsSection = document.getElementById('resultsSection');
            const resultsHeader = document.getElementById('resultsHeader');
            const resultsList = document.getElementById('resultsList');

            resultsHeader.textContent = `📍 Found ${stations.length} Police Station(s) in ${district.charAt(0).toUpperCase() + district.slice(1)}, ${state.charAt(0).toUpperCase() + state.slice(1)}`;

            resultsList.innerHTML = '';

            stations.forEach((station, index) => {
                const card = document.createElement('div');
                card.className = 'police-station-card';
                card.innerHTML = `
                    <div class="station-name">${index + 1}. ${station.name}</div>
                    <div class="station-info">
                        <div class="info-item">
                            <div class="info-icon">📍</div>
                            <div class="info-content">
                                <div class="info-label">Address</div>
                                <div class="info-value">${station.address}</div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon">📞</div>
                            <div class="info-content">
                                <div class="info-label">Contact</div>
                                <div class="info-value"><a href="tel:${station.contact}" style="color: #667eea; text-decoration: none;">${station.contact}</a></div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon">✉️</div>
                            <div class="info-content">
                                <div class="info-label">Email</div>
                                <div class="info-value"><a href="mailto:${station.email}" style="color: #667eea; text-decoration: none;">${station.email}</a></div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon">🏢</div>
                            <div class="info-content">
                                <div class="info-label">Jurisdiction</div>
                                <div class="info-value">${station.jurisdiction}</div>
                            </div>
                        </div>
                    </div>
                `;
                resultsList.appendChild(card);
            });

            resultsSection.style.display = 'block';
        }

        function displayNoResults() {
            const resultsSection = document.getElementById('resultsSection');
            const resultsList = document.getElementById('resultsList');

            resultsList.innerHTML = `
                <div class="no-results">
                    <p>❌ No police stations found for this location</p>
                    <p>Please try a different state or district</p>
                </div>
            `;

            resultsSection.style.display = 'block';
        }
